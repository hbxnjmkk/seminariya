<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F1E8D0">
<title>Лампада — подготовка в Сретенскую духовную академию</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;0,700;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1E8D0; --bg2:#FBF6E9; --card:#FFFDF6;
  --ink:#17233B; --ink-soft:#4B5670; --ink-faint:#8A8471;
  --gold:#BE8F2E; --gold-bright:#E0B54A; --gold-soft:#F0E1B4;
  --rubric:#A6321E; --rubric-soft:#E7C6BC;
  --green:#4B7A46; --green-soft:#DCE7D2;
  --blue:#2E5C86; --blue-soft:#D6E2ED;
  --line:rgba(23,35,59,.14); --line2:rgba(23,35,59,.08);
  --shadow:0 1px 0 rgba(23,35,59,.04),0 8px 24px rgba(23,35,59,.08);
  --r:18px; --r-lg:26px;
  --ui:'Golos Text',system-ui,sans-serif;
  --serif:'Lora',Georgia,serif;
  --display:'Cormorant',Georgia,serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--ui); color:var(--ink); background:var(--bg);
  background-image:radial-gradient(1200px 600px at 50% -10%,#FBF4DE 0%,var(--bg) 60%);
  min-height:100dvh; line-height:1.5; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:3px solid var(--blue);outline-offset:2px;border-radius:8px}
.app{max-width:560px;margin:0 auto;min-height:100dvh;position:relative;padding-bottom:88px}

/* ---------- top bar ---------- */
.top{position:sticky;top:0;z-index:40;background:rgba(241,232,208,.86);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line2);padding:10px 16px calc(10px)}
.top-row{display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:9px;margin-right:auto;min-width:0}
.brand .mark{width:30px;height:30px;flex:0 0 auto}
.brand b{font-family:var(--display);font-weight:700;font-size:23px;letter-spacing:.3px;line-height:1}
.brand small{display:block;font-size:10.5px;color:var(--ink-faint);letter-spacing:.2px;margin-top:1px;font-weight:500}
.stat{display:flex;align-items:center;gap:5px;font-weight:600;font-size:14.5px;padding:5px 10px;border-radius:999px;background:var(--card);border:1px solid var(--line2);box-shadow:var(--shadow)}
.stat svg{width:17px;height:17px}
.stat.streak{color:var(--rubric)} .stat.xp{color:var(--gold)}

/* ---------- generic ---------- */
.wrap{padding:16px}
.h-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold);margin:0 0 6px}
.h1{font-family:var(--display);font-weight:600;font-size:34px;line-height:1.02;margin:0 0 4px;letter-spacing:.2px}
.lead{color:var(--ink-soft);font-size:15px;margin:0 0 14px}
.rubric-initial{float:left;font-family:var(--display);font-weight:700;color:var(--rubric);font-size:60px;line-height:.78;margin:6px 12px 0 0}

/* daily goal ring card */
.goalcard{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:18px}
.ring{position:relative;width:66px;height:66px;flex:0 0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .rc{position:absolute;inset:0;display:grid;place-items:center;font-weight:700;font-size:15px;color:var(--gold)}
.goalcard .gt{font-family:var(--display);font-size:22px;font-weight:600;line-height:1.05}
.goalcard .gs{font-size:13px;color:var(--ink-soft);margin-top:2px}

/* ---------- path / units ---------- */
.section-label{display:flex;align-items:center;gap:12px;margin:26px 2px 14px}
.section-label .n{font-family:var(--display);font-weight:700;color:var(--rubric);font-size:26px;line-height:1;width:30px;text-align:center;flex:0 0 auto}
.section-label .tt{font-family:var(--display);font-size:22px;font-weight:600;line-height:1.05}
.section-label .ln{flex:1;height:1px;background:var(--line)}
.units{display:flex;flex-direction:column;gap:12px}
.unit{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);transition:transform .12s ease}
.unit:active{transform:scale(.99)}
.unit .ico{width:46px;height:46px;flex:0 0 auto;border-radius:14px;display:grid;place-items:center;background:var(--gold-soft);font-size:23px;border:1px solid rgba(190,143,46,.35)}
.unit.done .ico{background:var(--green-soft);border-color:rgba(75,122,70,.35)}
.unit.locked{opacity:.55}
.unit.locked .ico{background:#eee4cf;filter:grayscale(.4)}
.unit .ub{min-width:0;flex:1}
.unit .ut{font-weight:600;font-size:15.5px;line-height:1.2}
.unit .us{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.unit .prog{height:6px;border-radius:99px;background:var(--line2);margin-top:8px;overflow:hidden}
.unit .prog i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:99px}
.unit .chev{flex:0 0 auto;color:var(--ink-faint)}
.unit .check{color:var(--green)}
.badge{font-size:10.5px;font-weight:700;letter-spacing:.4px;padding:2px 7px;border-radius:99px;background:var(--rubric-soft);color:var(--rubric);text-transform:uppercase}
.badge.new{background:var(--blue-soft);color:var(--blue)}

/* ---------- bottom nav ---------- */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:center;
  background:rgba(251,246,233,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.nav-inner{display:flex;gap:2px;width:100%;max-width:560px}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:14px;color:var(--ink-faint);font-size:10.5px;font-weight:600}
.nav button svg{width:23px;height:23px}
.nav button.on{color:var(--rubric)}
.nav button.on svg{stroke:var(--rubric)}

/* ---------- lesson player ---------- */
.player{position:fixed;inset:0;z-index:100;background:var(--bg);
  background-image:radial-gradient(900px 500px at 50% -10%,#FBF4DE,var(--bg) 60%);
  display:flex;flex-direction:column;max-width:560px;margin:0 auto}
.p-head{display:flex;align-items:center;gap:12px;padding:14px 16px 6px}
.p-head .x{font-size:22px;color:var(--ink-faint);width:34px;height:34px;border-radius:10px;display:grid;place-items:center}
.pbar{flex:1;height:12px;border-radius:99px;background:#e6dcc1;overflow:hidden}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:99px;transition:width .35s cubic-bezier(.4,1.2,.5,1)}
.p-head .hearts{display:flex;align-items:center;gap:3px;color:var(--rubric);font-weight:700;font-size:14px}
.p-body{flex:1;overflow-y:auto;padding:8px 18px 12px;-webkit-overflow-scrolling:touch}
.qtag{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);margin:10px 0 10px}
.q{font-family:var(--display);font-size:27px;font-weight:600;line-height:1.12;margin:0 0 18px}
.q.sm{font-size:22px}

/* teaching / info card */
.info{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px;box-shadow:var(--shadow);font-family:var(--serif);font-size:16px;line-height:1.62}
.info h4{font-family:var(--ui);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--rubric);margin:0 0 8px;font-weight:700}
.info p{margin:0 0 11px} .info p:last-child{margin:0}
.info b{color:var(--ink)} .info em{color:var(--blue);font-style:italic}
.info .ref{color:var(--gold);font-weight:600;font-style:normal;font-family:var(--ui);font-size:13px}
.slav{font-family:var(--serif);font-style:italic;color:var(--ink);background:var(--gold-soft);border-left:3px solid var(--gold);padding:10px 14px;border-radius:0 12px 12px 0;margin:4px 0 12px;line-height:1.6}

/* options */
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line);border-radius:15px;padding:15px 16px;font-size:15.5px;font-weight:500;text-align:left;box-shadow:var(--shadow);transition:transform .1s,border-color .12s,background .12s}
.opt:active{transform:scale(.99)}
.opt .k{width:26px;height:26px;flex:0 0 auto;border-radius:8px;border:1.5px solid var(--line);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--ink-soft)}
.opt.sel{border-color:var(--blue);background:var(--blue-soft)}
.opt.sel .k{border-color:var(--blue);color:var(--blue)}
.opt.correct{border-color:var(--green);background:var(--green-soft)}
.opt.correct .k{background:var(--green);border-color:var(--green);color:#fff}
.opt.wrong{border-color:var(--rubric);background:#f6e2dc}
.opt.wrong .k{background:var(--rubric);border-color:var(--rubric);color:#fff}
.opt.dim{opacity:.5}

/* true/false */
.tf{display:flex;gap:12px}
.tf .opt{flex:1;justify-content:center;font-size:17px;font-weight:600}

/* flip card */
.flip{perspective:1400px}
.flip-in{position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,1,.4,1);min-height:230px}
.flip.on .flip-in{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.flip-face.back{transform:rotateY(180deg);background:linear-gradient(180deg,#FFFDF6,#FBF3DE)}
.flip .fq{font-family:var(--display);font-size:25px;font-weight:600;line-height:1.15}
.flip .fa{font-family:var(--serif);font-size:16.5px;line-height:1.6}
.flip .tap{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:12px;color:var(--ink-faint);font-weight:600;letter-spacing:.4px}

/* recite / prayer */
.recite{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:20px 20px 16px}
.recite .rt{font-family:var(--display);font-size:23px;font-weight:600;margin:0 0 4px}
.recite .rn{font-size:12.5px;color:var(--ink-soft);margin:0 0 14px}
.recite .rx{font-family:var(--serif);font-size:17px;line-height:1.72;color:var(--ink)}
.recite.hidden .rx{filter:blur(7px);user-select:none}
.recite .cover{text-align:center;margin-top:14px}

/* fill in the blanks */
.fill{font-family:var(--serif);font-size:18px;line-height:2.15;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.blank{display:inline-block;min-width:74px;border-bottom:2px solid var(--gold);text-align:center;color:var(--rubric);font-weight:600;padding:0 6px;font-family:var(--ui);font-size:15px}
.blank.empty{color:transparent}
.bank{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}
.chip{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:9px 14px;font-size:15px;font-weight:600;box-shadow:var(--shadow);font-family:var(--ui)}
.chip:active{transform:scale(.96)}
.chip.used{opacity:.35;pointer-events:none}
.chip.ok{border-color:var(--green);background:var(--green-soft)}
.chip.no{border-color:var(--rubric);background:#f6e2dc}

/* match */
.match{display:flex;gap:12px}
.mcol{flex:1;display:flex;flex-direction:column;gap:10px}
.mitem{background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:13px 12px;font-size:14px;font-weight:600;text-align:center;box-shadow:var(--shadow);line-height:1.25}
.mitem.sel{border-color:var(--blue);background:var(--blue-soft)}
.mitem.ok{border-color:var(--green);background:var(--green-soft);opacity:.65}
.mitem.no{border-color:var(--rubric);background:#f6e2dc;animation:shake .3s}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* order */
.order{display:flex;flex-direction:column;gap:9px}
.oitem{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;font-size:14.5px;font-weight:500;box-shadow:var(--shadow)}
.oitem .on{width:24px;height:24px;flex:0 0 auto;border-radius:7px;background:var(--gold-soft);display:grid;place-items:center;font-weight:700;font-size:13px;color:var(--gold)}
.oitem .ar{margin-left:auto;display:flex;flex-direction:column;gap:2px}
.oitem .ar button{width:30px;height:22px;border-radius:6px;background:var(--bg);display:grid;place-items:center;color:var(--ink-soft)}
.oitem.ok{border-color:var(--green);background:var(--green-soft)}
.oitem.no{border-color:var(--rubric)}

/* footer feedback + button */
.p-foot{padding:12px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line2);background:var(--bg2)}
.fb{border-radius:16px;padding:12px 14px;margin-bottom:10px;font-size:14.5px;line-height:1.45;display:flex;gap:10px;align-items:flex-start}
.fb .fi{flex:0 0 auto;width:24px;height:24px;border-radius:99px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:14px}
.fb.good{background:var(--green-soft);color:#2f5a2b} .fb.good .fi{background:var(--green)}
.fb.bad{background:#f6e2dc;color:#7c2515} .fb.bad .fi{background:var(--rubric)}
.fb b{display:block;margin-bottom:2px}
.btn{width:100%;border-radius:16px;padding:15px;font-size:16px;font-weight:700;letter-spacing:.3px;background:var(--ink);color:#FBF6E9;box-shadow:var(--shadow);transition:transform .1s,opacity .1s}
.btn:active{transform:translateY(1px)}
.btn.gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#3a2c07}
.btn.green{background:var(--green);color:#fff}
.btn.rub{background:var(--rubric);color:#fff}
.btn.ghost{background:transparent;color:var(--ink-soft);box-shadow:none;border:1.5px solid var(--line)}
.btn[disabled]{opacity:.4;pointer-events:none}
.btn-row{display:flex;gap:10px}

/* lesson complete */
.done-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:8px}
.done-screen .halo{width:120px;height:120px;margin-bottom:6px}
.done-screen h2{font-family:var(--display);font-size:36px;font-weight:600;margin:0}
.done-screen .rw{display:flex;gap:12px;margin:16px 0 4px}
.rwcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 18px;box-shadow:var(--shadow);min-width:96px}
.rwcard .rl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint)}
.rwcard .rv{font-family:var(--display);font-size:30px;font-weight:600;line-height:1.1}
.rwcard.g .rv{color:var(--gold)} .rwcard.r .rv{color:var(--rubric)}

/* reference / plan / misc pages */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:12px}
.card h3{font-family:var(--display);font-size:21px;font-weight:600;margin:0 0 8px}
.acc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.acc>button{width:100%;display:flex;align-items:center;gap:12px;padding:15px 16px;text-align:left}
.acc>button .ai{width:34px;height:34px;flex:0 0 auto;border-radius:10px;background:var(--gold-soft);display:grid;place-items:center;font-size:18px}
.acc>button .at{font-weight:600;font-size:15px;flex:1}
.acc>button .ac{color:var(--ink-faint);transition:transform .2s}
.acc.open>button .ac{transform:rotate(180deg)}
.acc .abody{display:none;padding:0 18px 16px;font-family:var(--serif);font-size:15.5px;line-height:1.62}
.acc.open .abody{display:block}
.acc .abody p{margin:0 0 10px} .acc .abody p:last-child{margin:0}
.acc .abody .slav{font-size:15px}
.acc .abody ul{margin:0 0 10px;padding-left:20px} .acc .abody li{margin-bottom:5px}

.plan-day{display:flex;gap:14px;margin-bottom:2px}
.plan-rail{display:flex;flex-direction:column;align-items:center;flex:0 0 auto}
.plan-dot{width:38px;height:38px;border-radius:12px;background:var(--gold-soft);border:1px solid rgba(190,143,46,.4);display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:19px;color:var(--gold)}
.plan-day.done .plan-dot{background:var(--green);color:#fff;border-color:var(--green)}
.plan-day.today .plan-dot{background:var(--rubric);color:#fff;border-color:var(--rubric);box-shadow:0 0 0 4px var(--rubric-soft)}
.plan-line{flex:1;width:2px;background:var(--line);margin:2px 0}
.plan-body{flex:1;padding-bottom:18px}
.plan-body .pd-t{font-weight:700;font-size:15px}
.plan-body .pd-s{font-size:13px;color:var(--ink-soft);margin:3px 0 8px}
.tagrow{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:99px;background:var(--bg);border:1px solid var(--line2);color:var(--ink-soft)}

.note{background:var(--blue-soft);border:1px solid rgba(46,92,134,.25);border-radius:var(--r);padding:14px 16px;font-size:14px;line-height:1.55;color:#20456a;margin-bottom:14px}
.note b{color:var(--blue)}
.warn{background:#f8ecc9;border:1px solid rgba(190,143,46,.4);border-radius:var(--r);padding:14px 16px;font-size:14px;line-height:1.55;color:#6a5212;margin-bottom:14px}

.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(20px);z-index:200;background:var(--ink);color:#FBF6E9;padding:11px 18px;border-radius:14px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.3s;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.footer-note{text-align:center;color:var(--ink-faint);font-size:12px;padding:22px 20px 8px;line-height:1.5}
.reset-btn{color:var(--rubric);font-weight:600;text-decoration:underline;font-size:12px}

@media (max-width:360px){.h1{font-size:29px}.q{font-size:23px}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.05ms!important}}

/* --- синхронизация --- */
.sync-card{display:flex;align-items:center;gap:12px;background:var(--blue-soft,#E8EEF5);border:1px solid rgba(46,92,134,.25);border-radius:14px;padding:12px 14px;margin:16px 0 4px}
.sc-ic{font-size:22px;flex:none}
.sc-tx{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.sc-tx b{font-family:var(--ui);font-size:13.5px;color:var(--ink)}
.sc-tx span{font-family:var(--ui);font-size:12px;color:#5a6b7d;line-height:1.35}
.sc-b{flex:none;font-family:var(--ui);font-weight:600;font-size:13px;color:#fff;background:var(--blue);border:none;border-radius:9px;padding:9px 13px;cursor:pointer}
.sc-b:active{transform:scale(.97)}
.sync-wrap{max-width:520px;margin:0 auto;padding:46px 22px 30px;position:relative;min-height:100%;box-sizing:border-box;display:flex;flex-direction:column}
.sync-h{font-family:var(--display);font-size:30px;color:var(--ink);margin:.05em 0 .3em;font-weight:600}
.sync-ta{width:100%;min-height:120px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;padding:12px;border:1.5px solid rgba(23,35,59,.2);border-radius:12px;background:#fff;color:var(--ink);margin:6px 0 14px;box-sizing:border-box;word-break:break-all}
.sync-ta:focus{outline:none;border-color:var(--blue)}

/* --- теория (reader перед тестом) --- */
.theory{max-width:560px;margin:0 auto;padding:6px 2px 20px}
.th-tag{font-family:var(--ui);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--rubric);margin-bottom:8px}
.th-h{font-family:var(--display);font-size:26px;line-height:1.15;color:var(--ink);margin:0 0 14px;font-weight:600}
.th-body{font-family:var(--serif);font-size:17px;line-height:1.62;color:#26313f}
.th-body p{margin:0 0 12px}
.th-body b{color:var(--ink);font-weight:600}
/* --- расписание экзаменов --- */
.exam-card{background:#fff;border:1px solid rgba(23,35,59,.1);border-radius:16px;padding:14px 14px 10px;margin:2px 0 20px;box-shadow:0 4px 16px rgba(23,35,59,.05)}
.ec-h{font-family:var(--ui);font-weight:700;font-size:13px;color:var(--ink);margin-bottom:10px}
.exrow{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:1px solid #efe7d4}
.exrow:first-of-type{border-top:none}
.exrow.past{opacity:.5}
.ex-ic{font-size:20px;flex:none;width:26px;text-align:center}
.ex-mid{flex:1;min-width:0}
.ex-t{font-family:var(--ui);font-weight:600;font-size:14px;color:var(--ink)}
.ex-d{font-family:var(--ui);font-size:11.5px;color:#8a97a6;margin-bottom:5px}
.ex-bar{height:5px;border-radius:3px;background:#ece3cf;overflow:hidden}
.ex-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:3px}
.ex-p{flex:none;font-family:var(--ui);font-weight:800;font-size:15px;color:var(--gold);text-align:center;line-height:1.05}
.ex-p span{display:block;font-weight:600;font-size:9px;letter-spacing:.03em;color:#a9b3bf}
.ec-note{font-family:var(--ui);font-size:11px;line-height:1.4;color:#97a1ad;margin-top:8px}
/* --- точки прогонов на карточке юнита --- */
.passrow{display:flex;align-items:center;gap:8px;margin-top:5px}
.pdots{display:inline-flex;gap:4px;flex:none}
.pd{width:9px;height:9px;border-radius:50%;background:#ded3ba;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
.pd.on{background:var(--gold-bright);box-shadow:0 0 0 1px var(--gold)}
.badge.ok{background:var(--green);color:#fff}
.passrow .prog{flex:1;margin:0}
/* --- план: круги и экзамены --- */
.round-sep{font-family:var(--ui);font-weight:700;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--rubric);margin:18px 0 8px;padding-left:2px}
.plan-day.past .plan-dot{background:#d8cdb4;color:#fff}
.plan-day.exam .plan-dot.ex{background:var(--ink);color:#fff;font-size:15px}
.tag.full{border-color:var(--green);background:rgba(75,122,70,.08)}
.tag .tp{font-size:10px;color:#8a97a6;margin-left:3px;font-weight:700}
.tag.full .tp{color:var(--green)}
/* --- «суть» в справочнике --- */
.ref-learn{background:rgba(190,143,46,.07);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:9px 12px;margin-bottom:12px;font-family:var(--serif);font-size:14.5px;line-height:1.55}
.ref-learn p{margin:0 0 7px}
.rl-tag{display:inline-block;font-family:var(--ui);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--rubric);margin-bottom:4px}

 c2:`<p>О Боге узнаём двумя путями: <b>естественное откровение</b> (через мир, красоту, совесть) и <b>сверхъестественное</b> — Бог Сам открылся: это <b>Писание</b> (Библия) и <b>Предание</b> (живой опыт Церкви: Соборы, святые, богослужение).</p><p>Библия = Ветхий Завет (до Христа) + Новый Завет. Она <b>богодухновенна</b>. Вера — не слепота, а доверие Богу и верность Ему.</p>`,
 c3:`<p><b>Троица:</b> один Бог в трёх Лицах — Отец, Сын, Дух. Не три бога и не «маски», а <b>единосущны и нераздельны</b>.</p><p><b>Христос</b> — истинный Бог и истинный человек в одном Лице (<b>Богочеловек</b>). <b>Грех</b> — не просто «нарушение», а разрыв с Богом; первородный грех унаследован от Адама и врачуется Христом.</p>`,
 c4:`<p><b>Церковь</b> — Тело Христово, Глава её — Христос.</p><p><b>7 таинств</b>, где подаётся благодать: <b>Крещение</b> (рождение в Церковь), <b>Миропомазание</b> (дары Духа), <b>Причащение</b> (соединение со Христом), <b>Покаяние</b> (прощение грехов), <b>Священство</b>, <b>Брак</b>, <b>Елеосвящение</b> (соборование). Центральные — Крещение и Причащение.</p>`,
 c5:`<p><b>10 заповедей</b> (Моисей, Синай): первые 4 — про отношение к Богу, остальные 6 — к людям (не убий, не укради, чти отца и мать…). Это «нельзя».</p><p><b>Заповеди блаженства</b> (Нагорная проповедь, 9 штук: «Блаженны нищие духом…») — это «как быть»: путь к Богу через смирение, милость, чистоту сердца.</p>`,
 c6:`<p><b>Главная заповедь:</b> люби Бога всем сердцем и ближнего как самого себя — на ней держится весь закон.</p><p><b>Молитва</b> — разговор с Богом: бывает просительная, благодарственная, покаянная, хвалебная. <b>Зло</b> — не «вещь», сотворённая Богом, а искажение добра, отпадение свободной воли (сначала падшие ангелы, потом люди). Бог зла не творил.</p>`,
 o1:`<p>Бог творит мир <b>из ничего</b> (евр. «бара»), словом, за шесть «дней». Венец творения — человек, по <b>образу и подобию</b> Божию.</p><p>Ангелы созданы раньше; часть отпала (сатана). Адам и Ева в раю → <b>грехопадение</b> (запретный плод, змей) → изгнание, в мир входит смерть. Тут же дано первое обещание Спасителя (Быт. 3:15).</p>`,
 o2:`<p>Люди развратились → <b>Потоп</b>; спасается <b>Ной</b> с семьёй в ковчеге, знак завета — радуга.</p><p><b>Патриархи:</b> <b>Авраам</b> — отец верующих (готов принести в жертву Исаака — образец веры). Исаак, <b>Иаков</b> (=Израиль, 12 сыновей). <b>Иосиф</b> — продан братьями, стал правителем Египта и спас род. <b>Мелхиседек</b> — прообраз Христа как Царя и Священника.</p>`,
 o3:`<p>Евреи в рабстве в Египте. Бог зовёт <b>Моисея</b> из неопалимой купины. <b>10 казней</b> → фараон отпускает народ.</p><p><b>Пасха</b> (кровь агнца на дверях), переход через <b>Чермное (Красное) море</b>. На <b>Синае</b> — 10 заповедей. 40 лет в пустыне. <b>Медный змий</b> (кто взглянул — жив) — прообраз Креста. Впереди — Земля обетованная.</p>`,
 o4:`<p>Судьи → цари: <b>Саул</b> (первый, отвергнут), <b>Давид</b> (муж по сердцу Богу, псалмы, взял Иерусалим), <b>Соломон</b> (мудрость, построил <b>Храм</b>).</p><p>После Соломона царство раскололось. <b>Пророки</b> (Исаия, Иеремия, Даниил…) обличали и предсказывали Мессию. За грехи — <b>Вавилонский плен</b>, затем возвращение и ожидание Христа.</p>`,
 n1:`<p><b>Благовещение:</b> Архангел Гавриил возвещает Деве Марии — родишь Спасителя от Духа Святого. <b>Рождество Христово</b> в Вифлееме (волхвы, пастухи, звезда).</p><p><b>Сретение:</b> на 40-й день Младенца принесли в Храм, встретил старец Симеон («ныне отпущаеши»). Богородица — <b>Приснодева</b>, родила Богочеловека.</p>`,
 n2:`<p>Иоанн Предтеча крестит на <b>Иордане</b>. <b>Крещение Христа = Богоявление</b>: глас Отца, Дух в виде голубя — явлена <b>Троица</b>.</p><p>40 дней поста, <b>искушение</b> в пустыне — Христос отверг сатану. Призвал <b>12 апостолов</b>, начал проповедь Царства Божия, творил чудеса.</p>`,
 n3:`<p><b>Притчи</b> — истории с духовным смыслом: о <b>блудном сыне</b> (покаяние и любовь Отца), о <b>сеятеле</b> (как принимаем слово), о <b>добром самарянине</b> (кто мне ближний).</p><p><b>Чудеса</b> — знаки власти и милости: исцеления, <b>воскрешение Лазаря</b>, насыщение 5000, хождение по воде. Это не магия, а любовь и явление Бога.</p>`,
 n4:`<p>Вход в Иерусалим → <b>Тайная вечеря</b> (Христос установил Причащение). Гефсимания, предательство Иуды, суд, <b>распятие на Голгофе</b>, смерть, погребение.</p><p>На <b>3-й день — Воскресение</b> (жёны-мироносицы, пустой гроб). 40 дней явлений → <b>Вознесение</b>. На 50-й день — <b>Пятидесятница</b>: сошествие Духа, рождение Церкви.</p>`,
 s1:`<p>Храм делится на три части: <b>притвор</b> (вход), <b>средняя часть</b> (для молящихся) и <b>алтарь</b> (за иконостасом).</p><p>В алтаре — <b>престол</b> (главное место), на нём <b>антиминс</b>. Рядом <b>жертвенник</b>, где готовят Дары. Знай предметы: <b>потир</b> (чаша), <b>дискос</b> (блюдо), звездица, <b>копие</b>, <b>лжица</b> (ложечка для Причастия).</p>`,
 s2:`<p><b>Три степени священства:</b> <b>диакон</b> (помогает), <b>священник</b> (пресвитер — совершает таинства), <b>епископ</b> (полнота, рукополагает других).</p><p>Облачения растут по степени: диакон — стихарь, <b>орарь</b>, поручи; священник добавляет <b>епитрахиль</b>, пояс, фелонь; епископ — <b>омофор</b>, митру, панагию, саккос. Цвет меняется по праздникам.</p>`,
 s3:`<p>Богослужение идёт кругами: <b>суточный</b> (вечерня, утреня, часы, литургия), седмичный, годовой.</p><p><b>Ектении</b> — прошения диакона, на которые отвечают «Господи, помилуй». Книги: <b>Служебник</b> (для священника), Часослов, <b>Октоих</b> (по гласам), <b>Минея</b> (по датам), <b>Триодь</b> (пост и Пасха), <b>Типикон</b> (устав), <b>Требник</b> (требы).</p>`,
 s4:`<p><b>Литургия</b> — главное богослужение, на ней совершается Причащение. Три части: <b>проскомидия</b> (готовят Дары), литургия <b>оглашенных</b> (чтения), литургия <b>верных</b> (Евхаристия). Чаще всего — свт. Иоанна Златоуста.</p><p><b>Страстная седмица:</b> Великий Четверг (Тайная вечеря), Пятница (распятие), Суббота. <b>Пасха</b> — «Христос воскресе!» — праздник праздников.</p>`,
 h1:`<p>После Пятидесятницы апостолы разнесли веру по миру. <b>Апостольский собор</b> (ок. 49–51) решил: язычникам не обязательно исполнять весь закон Моисея.</p><p>Гонения от Рима, множество мучеников. Перелом — император <b>Константин</b>: <b>Миланский эдикт 313</b> (свобода христианам) и <b>I Вселенский собор 325</b>.</p>`,
 h2:`<p><b>Это любимый вопрос — учи годы наизусть.</b> 7 Вселенских соборов защитили веру от ересей:</p><p><b>I</b> Никея <b>325</b> (арианство; Христос — Бог; Символ ч.1) · <b>II</b> Константинополь <b>381</b> (о Духе; Символ ч.2) · <b>III</b> Эфес <b>431</b> (Богородица, против Нестория) · <b>IV</b> Халкидон <b>451</b> (две природы Христа) · <b>V</b> 553 · <b>VI</b> 680–681 (две воли) · <b>VII</b> Никея <b>787</b> (иконопочитание).</p>`,
 h3:`<p><b>Кирилл и Мефодий</b> (IX в.) — славянская азбука и переводы, «учители словенские». <b>988 — Крещение Руси</b> при князе <b>Владимире</b>.</p><p>Ключевые святые: прпп. <b>Антоний и Феодосий</b> Печерские, прп. <b>Сергий Радонежский</b> (XIV в.), прп. <b>Серафим Саровский</b>, <b>Оптинские старцы</b>. Их полезно назвать на собеседовании.</p>`,
 h4:`<p><b>1054</b> — разделение Церквей (Восток/Запад). <b>1453</b> — падение Константинополя.</p><p>На Руси: <b>1589</b> — патриаршество; XVII в. — <b>раскол</b> (реформы патр. Никона, старообрядцы); <b>Пётр I</b> упразднил патриаршество (Синод); <b>1917</b> — восстановление патриаршества (свт. <b>Тихон</b>), затем гонения и новомученики; <b>1988</b> — 1000-летие Крещения Руси.</p>`,
 f1:`<p><b>12 двунадесятых праздников</b> (даты по н. ст.) — часто спрашивают:</p><p>Рождество Богородицы <b>21.09</b> · Воздвижение Креста <b>27.09</b> · Введение во храм <b>04.12</b> · Рождество Христово <b>07.01</b> · Крещение <b>19.01</b> · Сретение <b>15.02</b> · Благовещение <b>07.04</b> · Вход в Иерусалим и Вознесение и Троица (переходящие, привязаны к Пасхе) · Преображение <b>19.08</b> · Успение <b>28.08</b>. Над всеми — <b>Пасха</b>.</p>`,
 f2:`<p><b>4 многодневных поста:</b> <b>Великий</b> (перед Пасхой, самый строгий, 7 недель), <b>Петров</b>, <b>Успенский</b> (14–28.08), <b>Рождественский</b> (28.11–06.01).</p><p><b>Однодневные:</b> среда и пятница круглый год, Крещенский сочельник, Усекновение (11.09), Воздвижение (27.09). Пост — не диета, а время воздержания и усиленной молитвы.</p>`,
 f3:`<p><b>Отвечай искренне, а не заученно.</b> Спросят: почему хочешь учиться и/или в священство, как пришёл к вере, твоё <b>молитвенное правило</b>, любимый святой и почему, читал ли Евангелие.</p><p>Попросят прочитать молитвы наизусть. Главное — <b>живая вера и честность</b>, а не идеальные формулировки. Не бойся сказать «не знаю» — это лучше, чем выдумывать.</p>`,
 f4:`<p>Кроме богословия, в СДА сдают и <b>школьное</b>: <b>сочинение</b>, <b>историю (России)</b>, <b>русский язык</b> — как ЕГЭ или внутренний экзамен. Мин. баллы: история <b>32</b>, русский <b>36</b>.</p><p>Это отдельные экзамены 21–23 июля. В приложении есть выжимки (раздел VIII), но основную практику бери на <b>ФИПИ</b> — прорешивай пробники.</p>`,
 so1:`<p>Сочинение = <b>структура + аргументы + грамотность</b>, а не «вдохновение». Схема: вступление (тезис) → 2 аргумента с примерами из литературы → вывод. Объём <b>от 250 слов</b>, минимум <b>один литературный пример</b>. Следи за орфографией и запятыми — за грамотность тоже ставят балл.</p>`,
 ru1:`<p>Не учи всё — бей по частым ошибкам: <b>-тся/-ться</b> (вопрос «что делать?» → с ь), <b>«не»</b> (с глаголом раздельно; с сущ./прил. слитно, если есть синоним; раздельно при «а»), <b>запятая</b> перед что/который/если, <b>-н-/-нн-</b>. Разбор внутри + гоняй тесты ФИПИ.</p>`,
 hi1:`<p>Держись за <b>опорные даты</b>: 862 Рюрик · 988 Крещение (Владимир) · 1380 Куликово (Дмитрий Донской) · 1480 конец ига (Иван III) · 1547 первый царь (Иван IV) · 1613 Романовы · 1721 империя (Пётр I) · 1861 отмена крепостного права (Александр II).</p>`,
 hi2:`<p>XX век по точкам: <b>1917</b> — Февраль (отречение Николая II) и Октябрь (большевики, Ленин) · <b>1922</b> СССР · <b>1941–1945</b> Великая Отечественная (<b>9 мая</b> — Победа) · <b>1961</b> Гагарин · <b>1991</b> распад СССР.</p>`,
};

const LS_KEY = 'lampada_v1';
let mem = {};
function load(){ try{ const r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):null }catch(e){ return mem._s||null } }
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)) }catch(e){ mem._s=JSON.parse(JSON.stringify(S)) } }
const todayStr = ()=> new Date().toISOString().slice(0,10);

let S = load() || {
  xp:0, streak:0, lastDay:null, dayXp:0, dayXpDate:todayStr(),
  units:{}, srs:{}, plan:{}
};
// суточный сброс дневного XP
if(S.dayXpDate !== todayStr()){ S.dayXpDate=todayStr(); S.dayXp=0; }
const DAILY_GOAL = 40;

function bumpStreak(){
  const t = todayStr();
  if(S.lastDay === t) return;
  const y = new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak = (S.lastDay === y) ? S.streak+1 : 1;
  S.lastDay = t;
}
function addXp(n){
  S.xp += n;
  if(S.dayXpDate!==todayStr()){ S.dayXpDate=todayStr(); S.dayXp=0; }
  S.dayXp += n;
}
const unitById = id => UNITS.find(u=>u.id===id);
function unitProg(id){ const u=unitById(id); const done=(S.units[id]&&S.units[id].done)||[]; return u? done.length/u.cards.length : 0; }
function unitDone(id){ return unitProg(id)>=0.999; }
function gradeable(c){ return ['mc','tf','fill','match','order','flip'].includes(c.type); }
function unitPasses(id){ return (S.units[id]&&S.units[id].passes)||0; }

/* ==================== ДАТЫ, ЭКЗАМЕНЫ, ПРОГОНЫ ==================== */
const PASS_GOAL = 3;
function daysBetween(a,b){ return Math.round((Date.parse(b)-Date.parse(a))/864e5); }
function planIndexForToday(){
  const t=todayStr();
  let i=PLAN.findIndex(p=>p.d===t); if(i>=0) return i;
  i=PLAN.findIndex(p=>p.d>t); if(i>=0) return i;
  return PLAN.length-1;
}
function examUnits(e){ return e.units ? e.units.slice() : UNITS.filter(u=>e.tracks.includes(u.section)).map(u=>u.id); }
function examAvgPasses(e){ const ids=examUnits(e); if(!ids.length) return 0; return ids.reduce((s,id)=>s+Math.min(PASS_GOAL,unitPasses(id)),0)/ids.length; }
function nextExams(){ const t=todayStr(); return EXAMS.slice().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)); }
function firstUpcomingExam(){ const t=todayStr(); return nextExams().find(e=>e.date>=t)||null; }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1800); }

function fmtDate(iso){ const d=new Date(iso+'T00:00:00'); return d.getDate()+' '+RU_MON[d.getMonth()]; }
function ndays(n){ const a=Math.abs(n),l=a%10,d=a%100; if(l===1&&d!==11)return n+' день'; if(l>=2&&l<=4&&(d<12||d>14))return n+' дня'; return n+' дней'; }

function refBody(u){
  let h='';
  if(u.learn) h+=`<div class="ref-learn"><span class="rl-tag">СУТЬ</span>${u.learn}</div>`;
  for(const c of u.cards){
    if(c.type==='info') h+=`<div style="margin-bottom:10px">${c.title?`<p><b>${esc(c.title)}</b></p>`:''}${c.html}</div>`;
    else if(c.type==='recite') h+=`<div class="slav"><b style="font-family:var(--ui);font-size:12px;color:var(--rubric)">${esc(c.title)}</b><br>${esc(c.text)}</div>`;
    else if(c.type==='mc') h+=`<p><b>?</b> ${esc(c.q)}<br>→ <em>${esc(c.options[c.answer])}</em>${c.explain?`. ${esc(c.explain)}`:''}</p>`;
    else if(c.type==='tf') h+=`<p><b>?</b> ${esc(c.q)} → <em>${c.answer?'Верно':'Неверно'}</em>. ${esc(c.explain||'')}</p>`;
    else if(c.type==='match') h+=`<ul>${c.pairs.map(p=>`<li>${esc(p[0])} — ${esc(p[1])}</li>`).join('')}</ul>`;
    else if(c.type==='order') h+=`<p><b>Порядок:</b> ${c.items.map((x,i)=>`${i+1}) ${esc(x)}`).join('; ')}</p>`;
    else if(c.type==='fill') h+=`<div class="slav">${esc(c.text.replace(/\|([^|]+)\|/g,'$1'))}</div>`;
    else if(c.type==='flip') h+=`<p><b>${esc(c.front)}</b> — ${esc(c.back)}</p>`;
  }
  return h;
}

/* ==================== СИНХРОНИЗАЦИЯ (код прогресса, без сервера) ==================== */
function b64e(s){ return btoa(unescape(encodeURIComponent(s))); }
function b64d(s){ return decodeURIComponent(escape(atob(s))); }
function exportCode(){ return 'LMP1:'+b64e(JSON.stringify(S)); }
function mergeState(inc){
  if(!inc || typeof inc!=='object') throw new Error('bad');
  S.xp=Math.max(S.xp||0, inc.xp||0);
  S.streak=Math.max(S.streak||0, inc.streak||0);
  if(inc.lastDay && (!S.lastDay || inc.lastDay>S.lastDay)) S.lastDay=inc.lastDay;
  const t=todayStr();
  if(inc.dayXpDate===t){ if(S.dayXpDate===t) S.dayXp=Math.max(S.dayXp||0, inc.dayXp||0); else { S.dayXp=inc.dayXp||0; S.dayXpDate=t; } }
  const iu=inc.units||{};
  for(const id in iu){ const cur=(S.units[id]&&S.units[id].done)||[]; const add=iu[id].done||[]; S.units[id]={done:[...new Set([...cur,...add])]}; }
  S.srs=Object.assign({}, S.srs||{}, inc.srs||{});
}
function importCode(raw){
  raw=(raw||'').trim(); if(raw.startsWith('LMP1:')) raw=raw.slice(5);
  let obj; try{ obj=JSON.parse(b64d(raw)); }catch(e){ toast('Код не распознан'); return; }
  try{ mergeState(obj); save(); render(); toast('Прогресс объединён ✓'); closeSync(); }catch(e){ toast('Не удалось загрузить код'); }
}
function openSync(){
  let o=$('#sync'); if(!o){ o=el('<div class="player" id="sync"></div>'); document.body.appendChild(o); }
  document.body.style.overflow='hidden';
  o.innerHTML=`<div class="sync-wrap">
    <button class="x" id="syX" aria-label="Закрыть">✕</button>
    <p class="h-eyebrow">Между устройствами</p>
    <h2 class="sync-h">Код прогресса</h2>
    <p class="lead" style="font-size:14px">Скопируй код на одном устройстве и вставь на другом — прогресс объединится, ничего не потеряется.</p>
    <textarea id="syTa" class="sync-ta" placeholder="Вставь сюда код с другого устройства…" spellcheck="false"></textarea>
    <div class="btn-row"><button class="btn ghost" id="syGet">📋 Показать мой код</button><button class="btn green" id="syPut">Загрузить код</button></div>
    <div class="footer-note" style="text-align:left">Код — зашифрованная строка с твоим прогрессом. Никакого сервера: переносишь сам — через заметки, себе в мессенджер или AirDrop.</div>
  </div>`;
  $('#syX').onclick=closeSync;
  $('#syGet').onclick=async ()=>{ const code=exportCode(); const ta=$('#syTa'); ta.value=code; ta.focus(); ta.select();
    try{ await navigator.clipboard.writeText(code); toast('Код скопирован ✓'); }
    catch(e){ try{ document.execCommand('copy'); toast('Код скопирован ✓'); }catch(_){ toast('Выдели текст и скопируй вручную'); } } };
  $('#syPut').onclick=()=>{ const v=$('#syTa').value; if(!v.trim()){ toast('Сначала вставь код в поле'); return; } importCode(v); };
}
function closeSync(){ const o=$('#sync'); if(o) o.remove(); document.body.style.overflow=''; }

/* ==================== ПЛЕЕР УРОКОВ ==================== */
let L=null, A=null, PHASE='answer';
function startLesson(u, skipTheory){
  if(u.learn && !skipTheory){ openTheory(u); return; }
  L={cards:u.cards.map((c,i)=>({unit:u,card:c,idx:i,id:u.id+'#'+i})),pos:0,correct:0,graded:0,xp:0,review:false,title:u.title,unitId:u.id};
  openPlayer();
}
function openTheory(u){
  let p=$('#player'); if(!p){ p=el('<div class="player" id="player"></div>'); document.body.appendChild(p); }
  document.body.style.overflow='hidden';
  const ps=unitPasses(u.id);
  p.innerHTML=`<div class="p-head">
     <button class="x" id="tX" aria-label="Закрыть">✕</button>
     <div class="pbar"><i style="width:6%"></i></div>

   <div class="p-body"><div class="theory">

     <div class="th-body">${u.learn}</div>
   </div></div>
   <div class="p-foot"><button class="btn gold" id="toQuiz">Понял, к тесту →</button></div>`;

function startReview(){
  const due=shuffle(srsDue()).slice(0,15);
  if(!due.length){ toast('Нечего повторять'); return; }
  L={cards:due,pos:0,correct:0,graded:0,xp:0,review:true,title:'Повторение'};
  openPlayer();
}
function openPlayer(){
  let p=$('#player'); if(!p){ p=el('<div class="player" id="player"></div>'); document.body.appendChild(p); }
  document.body.style.overflow='hidden'; step();
}
function closePlayer(){ const p=$('#player'); if(p) p.remove(); document.body.style.overflow=''; render(); }

function markDone(entry,correct){
  const uid=entry.unit.id;
  S.units[uid]=S.units[uid]||{done:[]};
  if(!S.units[uid].done.includes(entry.idx)) S.units[uid].done.push(entry.idx);
  if(gradeable(entry.card)){
    if(correct===false) S.srs[entry.id]=true;
    else if(correct===true && S.srs[entry.id]) delete S.srs[entry.id];
  }
}

function step(){
  const p=$('#player');
  if(L.pos>=L.cards.length){ return finish(); }
  A=null; PHASE='answer';
  const entry=L.cards[L.pos], c=entry.card;
  const pct=Math.round(L.pos/L.cards.length*100);
  p.innerHTML=`
   <div class="p-head">
     <button class="x" id="pX" aria-label="Закрыть">✕</button>
     <div class="pbar"><i style="width:${pct}%"></i></div>
     <div class="hearts">${L.review?'🔁':'🕯️'} ${L.pos+1}/${L.cards.length}</div>
   </div>
   <div class="p-body" id="pBody"></div>
   <div class="p-foot" id="pFoot"></div>`;
  $('#pX').onclick=()=>{ if(confirm('Выйти из урока? Прогресс сохранён.')) closePlayer(); };
  const body=$('#pBody'), foot=$('#pFoot');
  const R={mc:renderMC,tf:renderTF,fill:renderFill,match:renderMatch,order:renderOrder,flip:renderFlip,recite:renderRecite,info:renderInfo}[c.type];
  R(entry,c,body,foot);
}

function footBtn(label,cls,fn,disabled){
  return `<button class="btn ${cls||''}" id="mainBtn" ${disabled?'disabled':''}>${label}</button>`;
}
function feedback(ok,text){
  return `<div class="fb ${ok?'good':'bad'}"><span class="fi">${ok?'✓':'✕'}</span><div><b>${ok?'Верно!':'Не совсем'}</b>${text?esc(text):''}</div></div>`;
}
function proceed(entry,correct,xp){
  markDone(entry,correct); addXp(xp); L.xp+=xp;
  if(gradeable(entry.card)){ L.graded++; if(correct)L.correct++; }
  save();
}

/* ---- multiple choice ---- */
function renderMC(entry,c,body,foot){
  body.innerHTML=`<div class="qtag">${L.review?'Повторение':'Вопрос'}</div><div class="q">${esc(c.q)}</div>
    <div class="opts">${c.options.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'АБВГ'[i]}</span><span>${esc(o)}</span></button>`).join('')}</div>`;
  foot.innerHTML=footBtn('Проверить','',null,true);
  const opts=body.querySelectorAll('.opt'), btn=$('#mainBtn');
  opts.forEach(o=> o.onclick=()=>{ if(PHASE!=='answer')return; opts.forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); A=+o.dataset.i; btn.disabled=false; });
  btn.onclick=()=>{
    if(PHASE==='answer'){ PHASE='reveal'; const ok=A===c.answer;
      opts.forEach((o,i)=>{ o.style.pointerEvents='none'; if(i===c.answer)o.className='opt correct'; else if(i===A)o.className='opt wrong'; else o.classList.add('dim'); });
      foot.innerHTML=feedback(ok,c.explain?' '+c.explain:'')+footBtn('Дальше',ok?'green':'rub');
      $('#mainBtn').onclick=()=>{ proceed(entry,ok,ok?3:1); next(); };
    }
  };
}

/* ---- true / false ---- */
function renderTF(entry,c,body,foot){
  body.innerHTML=`<div class="qtag">Верно или нет</div><div class="q">${esc(c.q)}</div>
    <div class="tf"><button class="opt" data-v="1">Верно</button><button class="opt" data-v="0">Неверно</button></div>`;
  foot.innerHTML=footBtn('Проверить','',null,true);
  const opts=body.querySelectorAll('.opt'), btn=$('#mainBtn');
  opts.forEach(o=> o.onclick=()=>{ if(PHASE!=='answer')return; opts.forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); A=o.dataset.v==='1'; btn.disabled=false; });
  btn.onclick=()=>{
    if(PHASE==='answer'){ PHASE='reveal'; const ok=A===c.answer;
      opts.forEach(o=>{ o.style.pointerEvents='none'; const v=o.dataset.v==='1'; if(v===c.answer)o.className='opt correct'; else if(v===A)o.className='opt wrong'; });
      foot.innerHTML=feedback(ok,c.explain?' '+c.explain:'')+footBtn('Дальше',ok?'green':'rub');
      $('#mainBtn').onclick=()=>{ proceed(entry,ok,ok?3:1); next(); };
    }
  };
}

/* ---- fill in the blanks ---- */
function renderFill(entry,c,body,foot){
  const parts=c.text.split(/\|([^|]+)\|/); // odd indexes are answers
  const answers=[]; parts.forEach((p,i)=>{ if(i%2) answers.push(p); });
  let html=`<div class="qtag">Вставь пропущенное</div>${c.hint?`<div class="q sm">${esc(c.hint)}</div>`:''}<div class="fill">`;
  let bi=0;
  parts.forEach((p,i)=>{ if(i%2){ html+=`<span class="blank empty" data-b="${bi}"></span>`; bi++; } else html+=esc(p); });
  html+=`</div><div class="bank">${shuffle(answers.map((a,i)=>({a,i}))).map(o=>`<button class="chip" data-w="${esc(o.a)}">${esc(o.a)}</button>`).join('')}</div>`;
  body.innerHTML=html;
  foot.innerHTML=footBtn('Проверить','',null,true);
  const blanks=[...body.querySelectorAll('.blank')], chips=[...body.querySelectorAll('.chip')], btn=$('#mainBtn');
  const filled=new Array(answers.length).fill(null);
  function redraw(){ blanks.forEach((b,i)=>{ b.textContent=filled[i]||''; b.classList.toggle('empty',!filled[i]); }); btn.disabled=filled.some(x=>x===null); }
  chips.forEach(ch=> ch.onclick=()=>{ if(PHASE!=='answer'||ch.classList.contains('used'))return; const idx=filled.indexOf(null); if(idx<0)return; filled[idx]=ch.dataset.w; ch.classList.add('used'); ch._blank=idx; redraw(); });
  blanks.forEach((b,i)=> b.onclick=()=>{ if(PHASE!=='answer'||!filled[i])return; const w=filled[i]; const ch=chips.find(c=>c.dataset.w===w&&c.classList.contains('used')&&c._blank===i)||chips.find(c=>c.dataset.w===w&&c.classList.contains('used')); if(ch){ch.classList.remove('used');ch._blank=null;} filled[i]=null; redraw(); });
  btn.onclick=()=>{
    if(PHASE==='answer'){ PHASE='reveal'; let ok=true;
      blanks.forEach((b,i)=>{ const good=filled[i]===answers[i]; if(!good)ok=false; b.style.color=good?'var(--green)':'var(--rubric)'; b.style.borderColor=good?'var(--green)':'var(--rubric)'; if(!good)b.textContent=answers[i]; });
      chips.forEach(ch=>ch.style.pointerEvents='none');
      foot.innerHTML=feedback(ok,ok?'':' Правильные слова подставлены.')+footBtn('Дальше',ok?'green':'rub');
      $('#mainBtn').onclick=()=>{ proceed(entry,ok,ok?3:1); next(); };
    }
  };
}

/* ---- match pairs ---- */
function renderMatch(entry,c,body,foot){
  const left=c.pairs.map((p,i)=>({t:p[0],i})), right=shuffle(c.pairs.map((p,i)=>({t:p[1],i})));
  body.innerHTML=`<div class="qtag">Соедини пары</div>${c.prompt?`<div class="q sm">${esc(c.prompt)}</div>`:''}
    <div class="match"><div class="mcol" id="mL">${left.map(o=>`<button class="mitem" data-i="${o.i}">${esc(o.t)}</button>`).join('')}</div>
    <div class="mcol" id="mR">${right.map(o=>`<button class="mitem" data-i="${o.i}">${esc(o.t)}</button>`).join('')}</div></div>`;
  foot.innerHTML=`<div class="fb good" style="background:var(--blue-soft);color:#20456a"><span class="fi" style="background:var(--blue)">i</span><div>Выбери слева, затем пару справа.</div></div>`+footBtn('Дальше','green',null,true);
  const L2=[...body.querySelectorAll('#mL .mitem')], R2=[...body.querySelectorAll('#mR .mitem')], btn=$('#mainBtn');
  let selL=null, matched=0, mistakes=0;
  function clearSel(){ L2.forEach(x=>x.classList.remove('sel')); R2.forEach(x=>x.classList.remove('sel')); }
  L2.forEach(b=> b.onclick=()=>{ if(b.classList.contains('ok'))return; clearSel(); selL=b; b.classList.add('sel'); });
  R2.forEach(b=> b.onclick=()=>{ if(b.classList.contains('ok')||!selL)return;
    if(b.dataset.i===selL.dataset.i){ b.classList.add('ok'); selL.classList.add('ok'); selL.classList.remove('sel'); selL=null; matched++;
      if(matched===c.pairs.length){ btn.disabled=false; const ok=mistakes===0; foot.querySelector('.fb').outerHTML=feedback(ok,ok?' Все пары верны.':' Пары собраны, но были ошибки — повторим позже.'); }
    } else { mistakes++; b.classList.add('no'); const s=selL; setTimeout(()=>{b.classList.remove('no','sel');s.classList.remove('sel');},350); selL=null; }
  });
  btn.onclick=()=>{ const ok=mistakes===0; proceed(entry,ok,ok?3:1); next(); };
}

/* ---- order ---- */
function renderOrder(entry,c,body,foot){
  let order=shuffle(c.items.map((t,i)=>({t,i})));
  if(order.every((o,i)=>o.i===i)) order=order.reverse();
  body.innerHTML=`<div class="qtag">Расставь по порядку</div>${c.prompt?`<div class="q sm">${esc(c.prompt)}</div>`:''}<div class="order" id="ord"></div>`;
  foot.innerHTML=footBtn('Проверить','');
  const wrap=$('#ord'), btn=$('#mainBtn');
  function draw(){ wrap.innerHTML=order.map((o,i)=>`<div class="oitem" data-p="${i}"><span class="on">${i+1}</span><span>${esc(o.t)}</span><span class="ar"><button data-up="${i}" ${i===0?'disabled':''}>▲</button><button data-dn="${i}" ${i===order.length-1?'disabled':''}>▼</button></span></div>`).join('');
    wrap.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>{const i=+b.dataset.up;[order[i-1],order[i]]=[order[i],order[i-1]];draw();});
    wrap.querySelectorAll('[data-dn]').forEach(b=>b.onclick=()=>{const i=+b.dataset.dn;[order[i+1],order[i]]=[order[i],order[i+1]];draw();});
  }
  draw();
  btn.onclick=()=>{ if(PHASE!=='answer')return; PHASE='reveal'; const ok=order.every((o,i)=>o.i===i);
    [...wrap.children].forEach((row,i)=>{ row.classList.add(order[i].i===i?'ok':'no'); row.querySelectorAll('button').forEach(b=>b.disabled=true); });
    foot.innerHTML=feedback(ok,ok?'':' Верный порядок — сверху вниз по номерам.')+footBtn('Дальше',ok?'green':'rub');
    $('#mainBtn').onclick=()=>{ proceed(entry,ok,ok?3:1); next(); };
  };
}

/* ---- flip card ---- */
function renderFlip(entry,c,body,foot){
  body.innerHTML=`<div class="qtag">Карточка</div><div class="flip" id="fl"><div class="flip-in">
    <div class="flip-face"><div class="fq">${esc(c.front)}</div><div class="tap">нажми, чтобы перевернуть</div></div>
    <div class="flip-face back"><div class="fa">${esc(c.back)}</div><div class="tap">знаешь?</div></div></div></div>`;
  foot.innerHTML=footBtn('Показать ответ','');
  const fl=$('#fl'), btn=$('#mainBtn');
  fl.onclick=()=> reveal();
  function reveal(){ if(PHASE!=='answer')return; PHASE='reveal'; fl.classList.add('on');
    foot.innerHTML=`<div class="btn-row"><button class="btn ghost" id="again">Повторить</button><button class="btn green" id="know">Помню</button></div>`;
    $('#know').onclick=()=>{ proceed(entry,true,2); next(); };
    $('#again').onclick=()=>{ proceed(entry,false,1); next(); };
  }
  btn.onclick=reveal;
}

/* ---- recite (prayer) ---- */
function renderRecite(entry,c,body,foot){
  body.innerHTML=`<div class="qtag">Молитва — учи наизусть</div>
    <div class="recite hidden" id="rc"><div class="rt">${esc(c.title)}</div>${c.note?`<div class="rn">${esc(c.note)}</div>`:''}<div class="rx">${esc(c.text)}</div></div>`;
  foot.innerHTML=footBtn('Показать текст','');
  const rc=$('#rc'), btn=$('#mainBtn');
  btn.onclick=()=>{
    if(rc.classList.contains('hidden')){ rc.classList.remove('hidden');
      foot.innerHTML=`<div class="btn-row"><button class="btn ghost" id="again">Ещё повторю</button><button class="btn green" id="know">Знаю</button></div>`;
      $('#know').onclick=()=>{ markDone(entry,null); addXp(2); L.xp+=2; save(); next(); };
      $('#again').onclick=()=>{ markDone(entry,null); if(gradeable(entry.card)){} addXp(1); L.xp+=1; save(); next(); };
    }
  };
}

/* ---- info (teaching) ---- */
function renderInfo(entry,c,body,foot){
  body.innerHTML=`<div class="qtag">${esc(c.tag||'Разбор')}</div><div class="info">${c.title?`<h4>${esc(c.title)}</h4>`:''}${c.html}</div>`;
  foot.innerHTML=footBtn('Понятно →','green');
  $('#mainBtn').onclick=()=>{ markDone(entry,null); addXp(1); L.xp+=1; save(); next(); };
}

function next(){ L.pos++; step(); }

/* ==================== ЗАВЕРШЕНИЕ ==================== */
function finish(){
  bumpStreak();
  let passNow=0;
  if(!L.review && L.unitId){ S.units[L.unitId]=S.units[L.unitId]||{done:[]}; S.units[L.unitId].passes=(S.units[L.unitId].passes||0)+1; passNow=S.units[L.unitId].passes; }
  save();
  const acc = L.graded? Math.round(L.correct/L.graded*100) : 100;
  const p=$('#player');
  p.innerHTML=`<div class="done-screen">
    <svg class="halo" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="46" stroke="#E0B54A" stroke-width="3" opacity=".5"/><circle cx="60" cy="60" r="38" stroke="#BE8F2E" stroke-width="2" opacity=".4"/><path d="M60 30c2.4 4.6 6.6 7.2 6.6 12.4 0 3.9-2.9 6.6-6.6 6.6s-6.6-2.7-6.6-6.6C53.4 37.2 57.6 34.6 60 30z" fill="#E0B54A" stroke="#BE8F2E"/><path d="M60 37c1.2 2.6 3.3 3.9 3.3 6.3 0 2-1.5 3.4-3.3 3.4s-3.3-1.4-3.3-3.4c0-2.4 2.1-3.7 3.3-6.3z" fill="#A6321E"/><rect x="55" y="49" width="10" height="26" rx="2" fill="#FBF6E9" stroke="#BE8F2E"/><path d="M46 76h28l-2.6 5.4a3 3 0 0 1-2.7 1.6H51.3a3 3 0 0 1-2.7-1.6L46 76z" fill="#BE8F2E"/></svg>
    <p class="h-eyebrow">${L.review?'Повторение пройдено':(passNow>=PASS_GOAL?'Готово! 3 прогона ✓':'Урок пройден')}</p>
    <h2>${L.title? esc(L.title):'Готово'}</h2>
    <div class="rw">
      <div class="rwcard g"><div class="rl">Очки</div><div class="rv">+${L.xp}</div></div>
      <div class="rwcard"><div class="rl">Точность</div><div class="rv">${acc}%</div></div>
      <div class="rwcard r"><div class="rl">${L.review?'Стрик':'Прогон'}</div><div class="rv">${L.review?S.streak+'🕯️':Math.min(passNow,PASS_GOAL)+'/'+PASS_GOAL}</div></div>
    </div>
    <div style="width:100%;max-width:340px;margin-top:18px">
      <button class="btn gold" id="doneBtn">Продолжить</button>
    </div>
  </div>`;
  $('#doneBtn').onclick=()=>{ closePlayer(); if(S.dayXp>=DAILY_GOAL) toast('Цель дня исполнена! 🕯️'); };
}

/* ==================== СТАРТ ==================== */
render();

</script>
